# LLM pricing table (USD per 1,000,000 tokens).
#
# IMPORTANT: These are a snapshot for cost ESTIMATION only. Prices change
# frequently and vary by region/contract. Always verify against the
# provider's official pricing page before relying on these numbers for
# real budgeting decisions:
#   - Anthropic: https://www.anthropic.com/pricing
#   - OpenAI:    https://openai.com/api/pricing
#   - Google:    https://ai.google.dev/gemini-api/docs/pricing
#
# Key format: "provider:model" (matches agents.llm_profile override
# format and llm_calls.provider/model columns).
#
# This file is safe to edit without a code change — llm-gateway loads it
# at runtime (engine/crates/llm-gateway/src/pricing.rs).

["anthropic:claude-haiku-4-5"]
